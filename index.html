    function calcMatchPoints(match, pred) {
      if (!pred || pred.homeScore === null || pred.homeScore === undefined) return null;
      if (match.homeScore === null || match.awayScore === null) return null;
      const hs=match.homeScore,as=match.awayScore,hp=pred.homeScore,ap=pred.awayScore;
      if (hp===hs && ap===as) return 3;
      const ar=hs>as?"H":hs<as?"A":"D", pr=hp>ap?"H":hp<ap?"A":"D";
      return ar===pr ? 1 : 0;
    }

    function genUID() { return "wc26_" + Math.random().toString(36).slice(2,9); }
    function isToday(dateStr) {
      // Compare against Central Time (CT = CDT during tournament = UTC-5)
      // Using toLocaleString with Chicago timezone is safe cross-browser
      const nowCT = new Date(new Date().toLocaleString("en-US", { timeZone: "America/Chicago" }));
      const y = nowCT.getFullYear();
      const m = String(nowCT.getMonth() + 1).padStart(2, "0");
      const d = String(nowCT.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}` === dateStr;
    }

    // Parse "2026-06-12" + "8:00 PM" CT into a JS Date (CT = UTC-5 standard, UTC-6 daylight — June = CDT = UTC-5)
    function matchKickoffDate(match) {
      const [y,mo,d] = match.date.split("-").map(Number);
      const timeParts = match.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!timeParts) return null;
      let h = parseInt(timeParts[1]), m = parseInt(timeParts[2]);
      const ampm = timeParts[3].toUpperCase();
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      // June is CDT = UTC-5
      return new Date(Date.UTC(y, mo-1, d, h+5, m));
    }

    function matchStatus(match) {
      const now = new Date();
      const kickoff = matchKickoffDate(match);
      if (!kickoff) return "upcoming";
      const hasScore = match.homeScore !== null && match.awayScore !== null;
      if (hasScore) return "finished";
      if (now >= kickoff) return "live";
      return "upcoming";
    }

    function isPredictionLocked(match) {
      const kickoff = matchKickoffDate(match);
      if (!kickoff) return false;
      return new Date() >= kickoff;
    }

    function timeUntilKickoff(match) {
      const kickoff = matchKickoffDate(match);
      if (!kickoff) return null;
      const diff = kickoff - new Date();
      if (diff <= 0) return null;
      const totalMins = Math.floor(diff / 60000);
      const days = Math.floor(totalMins / 1440);
      const hours = Math.floor((totalMins % 1440) / 60);
      const mins = totalMins % 60;
      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${mins}m`;
      return `${mins}m`;
    }

    // Qualification tracker: returns map of team -> "qualified"|"eliminated"|"contention"
    function getQualificationStatus(groupLetter, matches) {
      const teams = GROUPS[groupLetter];
      const groupMatches = matches.filter(m => m.group === groupLetter);
      const played = groupMatches.filter(m => m.homeScore !== null && m.awayScore !== null).length;
      if (played === 0) return {};
      const standings = getGroupStandings(groupLetter, matches);
      const maxMatchday = Math.max(...groupMatches.filter(m => m.homeScore !== null).map(m => m.matchday));
      const result = {};
      if (maxMatchday === 3) {
        // All played — top 2 qualified, bottom 2 eliminated
        standings.forEach((row, i) => {
          result[row.name] = i < 2 ? "qualified" : "eliminated";
        });
      } else if (maxMatchday === 2) {
        // After MD2: check if any team is mathematically guaranteed or eliminated
        // Max pts remaining = 3 more matches to play (MD3) = 3 pts each
        standings.forEach((row, i) => {
          const remaining = 3; // 1 match left = max 3 more pts
          const ptsBelow = standings[i].pts;
          // If top-2 team can't be caught even if they lose last: qualified
          if (i < 2) {
            const worstCase = ptsBelow; // could lose last game
            const bestCase3rd = standings[2].pts + remaining;
            if (worstCase > bestCase3rd) result[row.name] = "qualified";
            else result[row.name] = "contention";
          } else {
            const bestCase = ptsBelow + remaining;
            const worst2nd = standings[1].pts;
            if (bestCase < worst2nd) result[row.name] = "eliminated";
            else result[row.name] = "contention";
          }
        });
      } else {
        teams.forEach(t => { result[t] = "contention"; });
      }
      return result;
    }

    // Generate calendar ICS data URI for a match
    function calendarLink(match) {
      const kickoff = matchKickoffDate(match);
      if (!kickoff) return null;
      const end = new Date(kickoff.getTime() + 2*60*60*1000);
      const fmt = d => d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
      const v = VENUES.find(v=>v.id===match.venueId);
      const ics = [
        "BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
        `DTSTART:${fmt(kickoff)}`,`DTEND:${fmt(end)}`,
        `SUMMARY:⚽ ${match.home} vs ${match.away} (Group ${match.group})`,
        `LOCATION:${v?.fifaName||""}, ${v?.city||""}`,
        `DESCRIPTION:FIFA World Cup 2026 Group ${match.group} MD${match.matchday}`,
        "END:VEVENT","END:VCALENDAR"
      ].join("\n");
      return "data:text/calendar;charset=utf8," + encodeURIComponent(ics);
    }

    // Build group-wide prediction summary
    function getPredSummary(match, predictions, users) {
      const total = Object.values(users||{}).length;
      let home=0, draw=0, away=0, exact={};
      Object.values(users||{}).forEach(u => {
        const p = predictions?.[u.uid]?.[match.id];
        if (!p || p.homeScore===null || p.homeScore===undefined) return;
        const hp=p.homeScore, ap=p.awayScore;
        if (hp > ap) home++;
        else if (hp < ap) away++;
        else draw++;
        const key = `${hp}-${ap}`;
        exact[key] = (exact[key]||0)+1;
      });
      return { home, draw, away, total, exact };
    }

    // ─── COMPACT STANDINGS GENERATOR ───
    function getGroupStandings(groupLetter, matches) {
      const teams = GROUPS[groupLetter];
      const stats = {};
      teams.forEach(t => { stats[t] = { name: t, mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }; });

      matches.filter(m => m.group === groupLetter).forEach(m => {
        if (m.homeScore !== null && m.awayScore !== null) {
          const hs = m.homeScore;
          const as = m.awayScore;
          
          stats[m.home].mp++;
          stats[m.away].mp++;
          stats[m.home].gf += hs;
          stats[m.home].ga += as;
          stats[m.away].gf += as;
          stats[m.away].ga += hs;

          if (hs > as) {
            stats[m.home].w++;
            stats[m.away].l++;
            stats[m.home].pts += 3;
          } else if (hs < as) {
            stats[m.away].w++;
            stats[m.home].l++;
            stats[m.away].pts += 3;
          } else {
            stats[m.home].d++;
            stats[m.away].d++;
            stats[m.home].pts += 1;
          }
          stats[m.home].gd = stats[m.home].gf - stats[m.home].ga;
          stats[m.away].gd = stats[m.away].gf - stats[m.away].ga;
        }
      });

      return Object.values(stats).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    }

      const bgColor = isFav ? "rgba(250,204,21,0.04)" : status==="live" ? "rgba(74,222,128,0.03)" : "#141720";

        <div style={{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:14,padding:"11px 13px",marginBottom:6,position:"relative"}}>
          {/* Top badges row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              {today && <span style={{fontSize:"0.55rem",background:"#ef4444",color:"#fff",fontWeight:700,padding:"1px 5px",borderRadius:4}}>{t.today}</span>}
              {status==="live" && <span style={{fontSize:"0.55rem",background:"#4ade80",color:"#000",fontWeight:700,padding:"1px 5px",borderRadius:4,animation:"pulse 1.5s infinite"}}>● LIVE</span>}
              {resultBadge && <span style={{fontSize:"0.55rem",background:resultBadge.bg,color:resultBadge.color,border:`1px solid ${resultBadge.color}`,fontWeight:700,padding:"1px 5px",borderRadius:4}}>{resultBadge.label}</span>}
            </div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              {isFav && <span style={{fontSize:"0.6rem",color:"#facc15"}}>⭐</span>}
              {calLink && status==="upcoming" && (
                <a href={calLink} download={`wc26-match-${match.id}.ics`} title={t.addToCalendar}
                  style={{fontSize:"0.65rem",color:"#5a6070",textDecoration:"none",cursor:"pointer"}}>📆</a>
              )}
            </div>
          </div>

          {/* Group · MD · Time row */}
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:"0.63rem",color:"#5a6070"}}>
            <span>Group {match.group} · {t.matchday}{match.matchday}</span>
            <span style={{color: status==="live"?"#4ade80":"#facc15",fontWeight:600}}>
              {status==="live" ? "In progress" : `${match.time} ${t.timeLabel}`}
            </span>
          </div>

          {/* Teams and score */}
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{height:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}><Flag team={match.home}/></div>
              <div style={{fontWeight:700,fontSize:"0.72rem",color:"#f0f4ff",marginTop:4,textAlign:"center"}}>{match.home}</div>
            </div>
            <div style={{textAlign:"center",minWidth:72}}>
              {hasScore
                ? <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.7rem",color:"#facc15",lineHeight:1}}>{match.homeScore} – {match.awayScore}</div>
                : <div style={{color:"#3a4050",fontWeight:700,fontSize:"0.9rem"}}>{t.vs}</div>
              }
              {/* Countdown */}
              {!hasScore && countdown && status==="upcoming" && (
                <div style={{fontSize:"0.58rem",color:"#5a6070",marginTop:2}}>⏱ {countdown}</div>
              )}
              {/* User prediction */}
              {hasPred && (
                <div style={{fontSize:"0.62rem",color:"#a78bfa",marginTop:2}}>
                  🔮 {userPred.homeScore}–{userPred.awayScore}
                  {pts!==null && <span style={{marginLeft:2,fontWeight:800,color:pts===3?"#4ade80":pts===1?"#facc15":"#f87171"}}> +{pts}pt</span>}
                </div>
              )}
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{height:"16px",display:"flex",alignItems:"center",justifyContent:"center"}}><Flag team={match.away}/></div>
              <div style={{fontWeight:700,fontSize:"0.72rem",color:"#f0f4ff",marginTop:4,textAlign:"center"}}>{match.away}</div>
            </div>
          </div>

          {/* Venue */}
          <div style={{fontSize:"0.63rem",color:"#3a4050",textAlign:"center",marginTop:5}}>{v?.fifaName} · {v?.city}</div>

          {/* Group prediction summary (shown before kickoff if there are predictions) */}
          {predSummary && !hasScore && !locked && (predSummary.home+predSummary.draw+predSummary.away) > 0 && (
            <div style={{marginTop:7,padding:"5px 8px",background:"rgba(167,139,250,0.06)",borderRadius:6,border:"1px solid rgba(167,139,250,0.15)"}}>
              <div style={{fontSize:"0.58rem",color:"#a78bfa",fontWeight:700,marginBottom:3}}>{t.groupPredictions}</div>
              <div style={{display:"flex",gap:4}}>
                {[
                  {label:match.home.split(" ")[0],val:predSummary.home,color:"#4ade80"},
                  {label:"Draw",val:predSummary.draw,color:"#facc15"},
                  {label:match.away.split(" ")[0],val:predSummary.away,color:"#f87171"},
                ].map(({label,val,color})=>{
                  const total = predSummary.home+predSummary.draw+predSummary.away;
                  const pct = total > 0 ? Math.round((val/total)*100) : 0;
                  return (
                    <div key={label} style={{flex:1,textAlign:"center"}}>
                      <div style={{height:3,background:"#1e2230",borderRadius:2,overflow:"hidden",marginBottom:2}}>
                        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:"0.55rem",color:"#5a6070"}}>{label}</div>
                      <div style={{fontSize:"0.6rem",color,fontWeight:700}}>{val}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Action buttons */}
          <div style={{display:"flex",gap:5,marginTop:7}}>
            {profile?.isAdmin && (
              <button onClick={onScore} style={{flex:1,padding:"5px",background:"transparent",border:"1px solid rgba(250,204,21,0.3)",borderRadius:8,color:"#facc15",fontSize:"0.65rem",fontWeight:700,cursor:"pointer"}}>
                {hasScore?t.editScore:t.enterScore}
              </button>
            )}
            {!locked && !hasScore && (
              <button onClick={onPredict} style={{flex:2,padding:"5px",background:hasPred?"transparent":"#a78bfa",border:`1px solid ${hasPred?"#3a4050":"#a78bfa"}`,borderRadius:8,color:hasPred?"#9aa0b0":"#000",fontSize:"0.65rem",fontWeight:800,cursor:"pointer"}}>
                {hasPred?t.editPred:t.predict}
              </button>
            )}
            {locked && !hasScore && (
              <div style={{flex:2,padding:"5px",background:"rgba(255,255,255,0.03)",border:"1px solid #1e2230",borderRadius:8,color:"#3a4050",fontSize:"0.62rem",textAlign:"center"}}>
                🔒 {t.lockedPred}
              </div>
            )}
            {hasPred && (
              <button onClick={handleShare} title={t.sharePred} style={{width:28,padding:"4px",background:"transparent",border:"1px solid #1e2230",borderRadius:8,color:"#5a6070",fontSize:"0.7rem",cursor:"pointer",flexShrink:0}}>
                ↗
              </button>
            )}
          </div>
        </div>
      );
    }

    // ─── GROUPS TAB WITH QUALIFICATION INDICATORS ───
    function GroupsTab({ t, matches }) {
      return (
        <div style={{paddingBottom:80}}>
          {Object.keys(GROUPS).map(g => {
            const tableRows = getGroupStandings(g, matches);
            const qualStatus = getQualificationStatus(g, matches);
            return (
              <div key={g} style={{background:"#10131c",border:"1px solid #1e2230",borderRadius:16,padding:"12px",marginBottom:14,overflowX:"auto"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.3rem",color:"#facc15",marginBottom:2}}>GROUP {g}</div>
                <div style={{fontSize:"0.63rem",color:"#5a6070",marginBottom:10}}>{t.groupAdvance}</div>
                <table className="standings-table">
                  <thead>
                    <tr>
                      <th style={{textAlign:"left",paddingLeft:6}}>TEAM</th>
                      <th>MP</th><th>W</th><th>D</th><th>L</th>
                      <th>GF</th><th>GA</th><th>GD</th>
                      <th style={{color:"#facc15"}}>PTS</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {tableRows.map((row, idx) => {
                      const qs = qualStatus[row.name];
                      const rowBg = qs==="qualified" ? "rgba(74,222,128,0.04)" : qs==="eliminated" ? "rgba(248,113,113,0.03)" : "transparent";
                      return (
                        <tr key={row.name} style={{background:rowBg}}>
                          <td style={{textAlign:"left",paddingLeft:6,fontWeight:600,display:"flex",alignItems:"center"}}>
                            <Flag team={row.name} />
                            <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:80}}>{row.name}</span>
                          </td>
                          <td>{row.mp}</td><td>{row.w}</td><td>{row.d}</td><td>{row.l}</td>
                          <td>{row.gf}</td><td>{row.ga}</td>
                          <td style={{color:row.gd>0?"#4ade80":row.gd<0?"#f87171":"#5a6070"}}>{row.gd>0?`+${row.gd}`:row.gd}</td>
                          <td style={{fontWeight:800,color:"#facc15",background:"rgba(250,204,21,0.02)"}}>{row.pts}</td>
                          <td style={{padding:"0 4px"}}>
                            {qs==="qualified" && <span style={{fontSize:"0.5rem",color:"#4ade80",fontWeight:700,whiteSpace:"nowrap"}}>✓ Q</span>}
                            {qs==="eliminated" && <span style={{fontSize:"0.5rem",color:"#f87171",fontWeight:700,whiteSpace:"nowrap"}}>✗ E</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {Object.values(qualStatus).some(s=>s==="qualified"||s==="eliminated") && (
                  <div style={{display:"flex",gap:10,marginTop:6,fontSize:"0.55rem",color:"#5a6070"}}>
                    <span style={{color:"#4ade80"}}>✓ Q = Qualified</span>
                    <span style={{color:"#f87171"}}>✗ E = Eliminated</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── SCHEDULE TAB ───
    function ScheduleTab({ t, matches, profile, predictions, users, onScoreModal, onPredictModal, venueFilter, onClearVenueFilter }) {
      const [filter, setFilter] = useState("all");
      const [teamSearch, setTeamSearch] = useState("");
      const [selectedTeam, setSelectedTeam] = useState(null);

      // If a venue filter arrives, clear team search so they don't conflict
      useEffect(() => {
        if (venueFilter) { setSelectedTeam(null); setTeamSearch(""); }
      }, [venueFilter]);

      const favTeams = profile?.favorites || [];
      const ALL_TEAMS_SORTED = Object.values(GROUPS).flat();
      const selectedVenue = venueFilter ? VENUES.find(v => v.id === venueFilter) : null;

      // Autocomplete suggestions
      const suggestions = teamSearch.length > 0 && !selectedTeam
        ? ALL_TEAMS_SORTED.filter(tm => tm.toLowerCase().includes(teamSearch.toLowerCase()))
        : [];

      const clearTeamSearch = () => { setTeamSearch(""); setSelectedTeam(null); };

      // When a venue or team is selected, override other filters
      const filtered = venueFilter
        ? matches.filter(m => m.venueId === venueFilter)
        : selectedTeam
          ? matches.filter(m => m.home === selectedTeam || m.away === selectedTeam)
          : matches.filter(m => {
              if (filter === "today") return isToday(m.date);
              if (filter === "fav") return favTeams.includes(m.home) || favTeams.includes(m.away);
              return true;
            });

      const matchesByDate = {};
      filtered.forEach(m => {
        if (!matchesByDate[m.date]) matchesByDate[m.date] = [];
        matchesByDate[m.date].push(m);
      });
      const sortedDates = Object.keys(matchesByDate).sort();

      // Find which group a team is in
      const teamGroup = selectedTeam
        ? Object.entries(GROUPS).find(([, teams]) => teams.includes(selectedTeam))?.[0]
        : null;

      // Today's matches sticky section
      const todayMatches = matches.filter(m => isToday(m.date));

      return (
        <div style={{paddingBottom:80}}>

          {/* VENUE FILTER HEADER */}
          {venueFilter && selectedVenue && (
            <div style={{marginBottom:12}}>
              <button onClick={onClearVenueFilter}
                style={{display:"flex",alignItems:"center",gap:5,background:"transparent",border:"none",color:"#7a8090",cursor:"pointer",fontSize:"0.7rem",fontWeight:700,marginBottom:8,padding:0}}>
                ← All Matches
              </button>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:"rgba(167,139,250,0.05)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12}}>
                <span style={{fontSize:"1.4rem"}}>🏟️</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:"0.85rem",color:"#a78bfa"}}>{selectedVenue.fifaName}</div>
                  <div style={{fontSize:"0.65rem",color:"#5a6070",marginTop:1}}>{selectedVenue.realName} · {selectedVenue.city} · {filtered.length} match{filtered.length!==1?"es":""}</div>
                </div>
              </div>
            </div>
          )}

          {/* TODAY STICKY SECTION */}
          {todayMatches.length > 0 && !selectedTeam && !venueFilter && filter !== "today" && (
            <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:"10px 12px",marginBottom:12}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1rem",color:"#ef4444",letterSpacing:"0.06em",marginBottom:8}}>📺 {t.todayMatches}</div>
              {todayMatches.map(m => (
                <MatchCard key={m.id} match={m} profile={profile} t={t}
                  isFav={favTeams.includes(m.home)||favTeams.includes(m.away)}
                  userPred={predictions?.[profile?.uid]?.[m.id]}
                  onScore={()=>onScoreModal(m)} onPredict={()=>onPredictModal(m)}
                  predictions={predictions} users={users} showPredSummary={true} />
              ))}
            </div>
          )}

          {/* Team search box — hidden when venue filter active */}
          {!venueFilter && <div style={{position:"relative",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",background:"#141720",border:"1px solid #1e2230",borderRadius:10,overflow:"visible"}}>
              <span style={{padding:"0 10px",fontSize:"0.85rem",color:"#5a6070"}}>🔍</span>
              <input
                value={teamSearch}
                onChange={e => { setTeamSearch(e.target.value); setSelectedTeam(null); }}
                placeholder="Search by team name…"
                style={{flex:1,background:"transparent",border:"none",padding:"9px 0",color:"#f0f4ff",fontSize:"0.8rem",outline:"none"}}
              />
              {(teamSearch || selectedTeam) && (
                <button onClick={clearTeamSearch} style={{background:"transparent",border:"none",color:"#5a6070",cursor:"pointer",padding:"0 10px",fontSize:"0.9rem"}}>✕</button>
              )}
            </div>
            {/* Dropdown suggestions */}
            {suggestions.length > 0 && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#141720",border:"1px solid #1e2230",borderTop:"none",borderRadius:"0 0 10px 10px",zIndex:20,maxHeight:200,overflowY:"auto"}}>
                {suggestions.map(team => (
                  <button key={team} onClick={() => { setSelectedTeam(team); setTeamSearch(team); }}
                    style={{width:"100%",padding:"9px 12px",background:"transparent",border:"none",borderBottom:"1px solid #121620",color:"#f0f4ff",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:"0.78rem",textAlign:"left"}}>
                    <Flag team={team} />
                    <span style={{fontWeight:600}}>{team}</span>
                    <span style={{fontSize:"0.62rem",color:"#5a6070",marginLeft:"auto"}}>
                      Group {Object.entries(GROUPS).find(([,ts]) => ts.includes(team))?.[0]}
                    </span>
                  </button>
                ))}
              </div>
            )}
          </div>}

          {/* Favorite teams quick-links (shown when no search active) */}
          {favTeams.length > 0 && !selectedTeam && !venueFilter && teamSearch.length === 0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:"0.6rem",color:"#7a8090",fontWeight:700,letterSpacing:"0.08em",marginBottom:5}}>⭐ MY TEAMS — TAP TO FILTER</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {favTeams.map(team => (
                  <button key={team} onClick={() => { setSelectedTeam(team); setTeamSearch(team); }}
                    style={{padding:"5px 10px",borderRadius:8,border:"1px solid rgba(250,204,21,0.3)",background:"rgba(250,204,21,0.06)",color:"#facc15",fontSize:"0.7rem",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                    <Flag team={team} />{team}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Selected team header */}
          {selectedTeam && (
            <div style={{marginBottom:10}}>
              <button onClick={clearTeamSearch} style={{display:"flex",alignItems:"center",gap:5,background:"transparent",border:"none",color:"#7a8090",cursor:"pointer",fontSize:"0.7rem",fontWeight:700,marginBottom:8,padding:0}}>
                ← All Matches
              </button>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"rgba(250,204,21,0.06)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:10}}>
                <Flag team={selectedTeam} />
                <div>
                  <div style={{fontWeight:800,fontSize:"0.85rem",color:"#facc15"}}>{selectedTeam}</div>
                  <div style={{fontSize:"0.62rem",color:"#5a6070"}}>Group {teamGroup} · {filtered.length} matches</div>
                </div>
              </div>
            </div>
          )}

          {/* Filter buttons — hidden when team or venue selected */}
          {!selectedTeam && !venueFilter && (
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {["all", "today", "fav"].map(f => (
                <button key={f} onClick={()=>setFilter(f)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:filter===f?"#facc15":"#141720",color:filter===f?"#000":"#7a8090",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"}}>
                  {f === "all" ? "ALL" : f === "today" ? "TODAY" : "⭐ FAVS"}
                </button>
              ))}
            </div>
          )}

          {/* Match list */}
          {sortedDates.length === 0
            ? <div style={{textAlign:"center",color:"#3a4050",padding:"2rem",fontSize:"0.8rem"}}>{t.noMatches}</div>
            : sortedDates.map(dateStr => {
                const dOptions = { weekday:"long", month:"short", day:"numeric", year:"numeric" };
                const cleanDate = new Date(dateStr + "T12:00:00").toLocaleDateString(profile?.lang || "en", dOptions);
                return (
                  <div key={dateStr} style={{marginBottom:20}}>
                    <div style={{fontSize:"0.85rem",fontWeight:800,color:"#facc15",padding:"4px 8px",background:"rgba(250,204,21,0.08)",borderRadius:6,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                      📅 {cleanDate}
                    </div>
                    {matchesByDate[dateStr].map(m => (
                      <MatchCard key={m.id} match={m} profile={profile} t={t}
                        isFav={favTeams.includes(m.home) || favTeams.includes(m.away)}
                        userPred={predictions?.[profile?.uid]?.[m.id]}
                        onScore={() => onScoreModal(m)}
                        onPredict={() => onPredictModal(m)}
                        predictions={predictions} users={users} showPredSummary={true} />
                    ))}
                  </div>
                );
              })
          }
        </div>
      );
    }

        {no:103,date:"Jul 18",time:"4:00 PM CT", venue:"Miami Stadium",                 home:"Loser SF 1", away:"Loser SF 2"},
      ]},
      { round:"FINAL", dates:"July 19", color:"#facc15", matches:[
        {no:104,date:"Jul 19",time:"2:00 PM CT", venue:"New York New Jersey Stadium",   home:"W101", away:"W102"},
      ]},
    ];

    function KnockoutTab({ t }) {
      const [expanded, setExpanded] = useState("Round of 32");
      return (
        <div style={{paddingBottom:80}}>
          {/* Banner */}
          <div style={{background:"linear-gradient(135deg,#10131c,#1a1d2e)",border:"1px solid #1e2230",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",color:"#facc15",letterSpacing:"0.06em",lineHeight:1}}>KNOCKOUT STAGE</div>
            <div style={{fontSize:"0.7rem",color:"#7a8090",marginTop:3}}>June 28 – July 19 · 32 matches · All QF/SF/Final in USA</div>
            <div style={{marginTop:10,padding:"8px 10px",background:"rgba(250,204,21,0.06)",border:"1px dashed rgba(250,204,21,0.25)",borderRadius:8,fontSize:"0.68rem",color:"#facc15",textAlign:"center"}}>
              ⏳ Teams revealed after group stage ends June 27
            </div>
          </div>

          {/* Round selector pills */}
          <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
            {KNOCKOUT_STRUCTURE.map(r => (
              <button key={r.round} onClick={()=>setExpanded(expanded===r.round?null:r.round)}
                style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${expanded===r.round?r.color:"#1e2230"}`,background:expanded===r.round?`rgba(0,0,0,0.3)`:"transparent",color:expanded===r.round?r.color:"#5a6070",fontSize:"0.68rem",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                {r.round}
              </button>
            ))}
          </div>

          {/* Match cards for selected round */}
          {KNOCKOUT_STRUCTURE.map(r => expanded===r.round && (
            <div key={r.round}>
              <div style={{marginBottom:10}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.2rem",letterSpacing:"0.06em",color:r.color}}>{r.round}</div>
                <div style={{fontSize:"0.65rem",color:"#5a6070"}}>{r.dates} · {r.matches.length} match{r.matches.length>1?"es":""}</div>
              </div>
              {r.matches.map(m => (
                <div key={m.no} style={{background:"#141720",border:`1px solid #1e2230`,borderLeft:`3px solid ${r.color}`,borderRadius:12,padding:"10px 12px",marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:"0.62rem"}}>
                    <span style={{color:r.color,fontWeight:700}}>Match {m.no}</span>
                    <span style={{color:"#5a6070"}}>{m.date} · {m.time}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <div style={{flex:1,textAlign:"center",fontSize:"0.72rem",fontWeight:700,color:"#f0f4ff",lineHeight:1.3}}>{m.home}</div>
                    <div style={{minWidth:40,textAlign:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:"0.95rem",color:"#3a4050"}}>VS</div>
                    <div style={{flex:1,textAlign:"center",fontSize:"0.72rem",fontWeight:700,color:"#f0f4ff",lineHeight:1.3}}>{m.away}</div>
                  </div>
                  <div style={{fontSize:"0.6rem",color:"#3a4050",textAlign:"center"}}>{m.venue}</div>
                </div>
              ))}
            </div>
          ))}

          {/* Full path visual */}
          <div style={{background:"#10131c",border:"1px solid #1e2230",borderRadius:14,padding:"12px 14px",marginTop:6}}>
            <div style={{fontSize:"0.65rem",fontWeight:700,color:"#5a6070",letterSpacing:"0.08em",marginBottom:8}}>PATH TO THE FINAL</div>
            {KNOCKOUT_STRUCTURE.map((r,i) => (
              <div key={r.round} style={{display:"flex",alignItems:"center",gap:8,marginBottom: i<KNOCKOUT_STRUCTURE.length-1?6:0}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <span style={{fontSize:"0.72rem",fontWeight:700,color:r.color}}>{r.round}</span>
                  <span style={{fontSize:"0.62rem",color:"#5a6070",marginLeft:8}}>{r.dates}</span>
                </div>
                <span style={{fontSize:"0.62rem",color:"#3a4050"}}>{r.matches.length * 2} teams</span>
                {i<KNOCKOUT_STRUCTURE.length-1 && (
                  <div style={{position:"absolute",left:17,marginTop:16,width:1,height:6,background:"#1e2230"}}/>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── VENUES TAB ───
    function VenuesTab({ t, matches, onVenueSelect }) {
      const countryFlag = { USA:"🇺🇸", Mexico:"🇲🇽", Canada:"🇨🇦" };
      const countryOrder = ["USA", "Mexico", "Canada"];

      // Count matches per venue
      const matchCount = {};
      (matches||[]).forEach(m => {
        matchCount[m.venueId] = (matchCount[m.venueId]||0) + 1;
      });

      return (
        <div style={{paddingBottom:80}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#facc15",marginBottom:4}}>VENUES</div>
          <div style={{fontSize:"0.65rem",color:"#5a6070",marginBottom:14}}>Tap a venue to see its matches</div>

          {countryOrder.map(country => {
            const countryVenues = VENUES.filter(v => v.country === country);
            return (
              <div key={country} style={{marginBottom:16}}>
                <div style={{fontSize:"0.65rem",fontWeight:700,color:"#facc15",letterSpacing:"0.08em",marginBottom:7,paddingBottom:4,borderBottom:"1px solid #1e2230"}}>
                  {countryFlag[country]} {country.toUpperCase()} — {countryVenues.length} venues
                </div>
                {countryVenues.map(v => {
                  const mc = matchCount[v.id] || 0;
                  return (
                    <button key={v.id} onClick={()=>onVenueSelect(v.id)}
                      style={{width:"100%",background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:6,cursor:"pointer",textAlign:"left",display:"block",transition:"border-color 0.15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:"0.8rem",color:"#f0f4ff"}}>{v.fifaName}</div>
                          <div style={{fontSize:"0.67rem",color:"#7a8090",marginTop:1}}>
                            {v.realName} — {v.city}
                          </div>
                          {v.note && (
                            <div style={{fontSize:"0.62rem",color:"#facc15",marginTop:3,fontWeight:600}}>★ {v.note}</div>
                          )}
                        </div>
                        <div style={{flexShrink:0,textAlign:"right"}}>
                          <div style={{fontSize:"0.62rem",background:"#0a0d14",padding:"3px 6px",borderRadius:6,color:"#9aa0b0",fontWeight:600,marginBottom:4}}>
                            {v.capacity.toLocaleString()} {t.capacity}
                          </div>
                          {mc > 0 && (
                            <div style={{fontSize:"0.6rem",color:"#facc15",fontWeight:700}}>
                              {mc} match{mc>1?"es":""}
                            </div>
                          )}
                        </div>
                      </div>
                      <div style={{marginTop:8,display:"flex",alignItems:"center",gap:4,color:"#a78bfa",fontSize:"0.65rem",fontWeight:700}}>
                        <span>📅 View schedule</span>
                        <span style={{fontSize:"0.7rem"}}>→</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── LEADERBOARD TAB ───
    function LeaderboardTab({ t, users, matches, predictions }) {
      const calculated = Object.values(users || {}).map(u => {
        let score = 0; let exact = 0; let correct = 0; let count = 0;
        const upred = predictions?.[u.uid] || {};
        const scored = matches.filter(m => m.homeScore!==null && m.awayScore!==null);
        scored.forEach(m => {
          const pts = calcMatchPoints(m, upred[m.id]);
          if (pts !== null) { score += pts; count++; if (pts === 3) exact++; if (pts === 1) correct++; }
        });
        const hitRate = count > 0 ? Math.round(((exact+correct)/count)*100) : null;
        return { ...u, score, exact, correct, count, hitRate };
      }).sort((a,b) => b.score - a.score || b.exact - a.exact);

      const medals = ["🥇","🥈","🥉"];

      return (
        <div style={{paddingBottom:80}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#facc15",marginBottom:4}}>LEADERBOARD</div>
          <div style={{fontSize:"0.62rem",color:"#5a6070",marginBottom:12}}>Exact score = 3pts · Correct result = 1pt</div>
          {calculated.map((u, idx) => {
            const isFirst = idx === 0;
            return (
              <div key={u.uid} style={{background: isFirst?"rgba(250,204,21,0.06)":"#141720",border:`1px solid ${isFirst?"rgba(250,204,21,0.3)":"#1e2230"}`,borderRadius:12,padding:"10px 12px",marginBottom:5,display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#facc15",width:28,textAlign:"center"}}>{medals[idx]||idx+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:"0.82rem",color:"#f0f4ff"}}>
                    {u.name} {u.isAdmin && <span style={{fontSize:"0.52rem",background:"#facc15",color:"#000",padding:"0px 4px",borderRadius:3}}>ADMIN</span>}
                  </div>
                  <div style={{fontSize:"0.6rem",color:"#5a6070",marginTop:2}}>
                    {u.count} played · {u.exact}🏅 exact · {u.correct}✓ result
                  </div>
                  {u.hitRate !== null && (
                    <div style={{marginTop:4}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.52rem",color:"#5a6070",marginBottom:2}}>
                        <span>{t.hitRate}</span><span style={{color:"#facc15"}}>{u.hitRate}%</span>
                      </div>
                      <div style={{height:3,background:"#1e2230",borderRadius:2,overflow:"hidden"}}>
                        <div style={{width:`${u.hitRate}%`,height:"100%",background:`hsl(${u.hitRate},70%,50%)`,borderRadius:2,transition:"width 0.5s"}}/>
                      </div>
                    </div>
                  )}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",color:"#facc15",lineHeight:1}}>{u.score}</div>
                  <div style={{fontSize:"0.52rem",color:"#5a6070"}}>{t.pts.toUpperCase()}</div>
                </div>
              </div>
            );
          })}
          {calculated.length === 0 && (
            <div style={{textAlign:"center",color:"#3a4050",padding:"2rem",fontSize:"0.8rem"}}>No predictions yet</div>
          )}
        </div>
      );
    }

    // ─── ME PROFILE TAB ───
    function ProfileTab({ profile, t, onUpdateTeams }) {
      const [copied, setCopied] = useState(false);
      const [editing, setEditing] = useState(false);
      const [favs, setFavs] = useState(profile.favorites || []);
      const shareUrl = `${window.location.origin}${window.location.pathname}?uid=${profile.uid}`;

      const doCopy = () => { navigator.clipboard.writeText(shareUrl); setCopied(true); setTimeout(() => setCopied(false), 2000); };
      const toggleFav = (t) => setFavs(f => f.includes(t)?f.filter(x=>x!==t):[...f,t]);
      const saveTeams = () => { onUpdateTeams(favs); setEditing(false); };

      return (
        <div style={{paddingBottom:80}}>
          <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:16,padding:"16px",textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:"2.5rem"}}>👤</div>
            <div style={{fontWeight:800,fontSize:"1.2rem",color:"#f0f4ff",marginTop:4}}>{profile.name}</div>
            <div style={{fontSize:"0.65rem",color:"#7a8090",marginTop:2}}>{profile.isAdmin ? "🥇 System Administrator" : "Family Competitor"}</div>
          </div>

          {!editing ? (
            <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:"#7a8090",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                <span>{t.favoriteTeams.toUpperCase()}</span>
                <button onClick={()=>setEditing(true)} style={{background:"transparent",border:"none",color:"#facc15",cursor:"pointer",fontSize:"0.7rem"}}>✏️ EDIT</button>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {profile.favorites?.map(f => (
                  <span key={f} style={{background:"#0a0d14",border:"1px solid #1e2230",padding:"4px 8px",borderRadius:6,fontSize:"0.68rem",display:"inline-flex",alignItems:"center"}}><Flag team={f} /> {f}</span>
                )) || <span style={{fontSize:"0.68rem",color:"#3a4050"}}>None</span>}
              </div>
            </div>
          ) : (
            <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:"#facc15",marginBottom:8}}>{t.pickFavorites}</div>
              <div style={{maxHeight:180,overflowY:"auto",display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                {ALL_TEAMS.map(team => {
                  const sel = favs.includes(team);
                  return (
                    <button key={team} onClick={()=>toggleFav(team)} style={{padding:"4px 8px",fontSize:"0.65rem",borderRadius:6,background:sel?"rgba(250,204,21,0.1)":"transparent",border:`1px solid ${sel?"#facc15":"#1e2230"}`,color:sel?"#facc15":"#7a8090",cursor:"pointer",display:"flex",alignItems:"center"}}>
                      <Flag team={team} /> {team}
                    </button>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEditing(false)} style={{flex:1,padding:"6px",background:"transparent",border:"1px solid #1e2230",color:"#5a6070",borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Cancel</button>
                <button onClick={saveTeams} style={{flex:2,padding:"6px",background:"#facc15",border:"none",color:"#000",fontWeight:800,borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Save Favorites</button>
              </div>
            </div>
          )}

          <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
            <div style={{fontSize:"0.72rem",fontWeight:700,color:"#facc15",marginBottom:3}}>{t.shareLink.toUpperCase()}</div>
            <div style={{fontSize:"0.65rem",color:"#5a6070",marginBottom:10}}>{t.shareLinkHint}</div>
            <div style={{display:"flex",gap:6}}>
              <input readOnly value={shareUrl} style={{flex:1,background:"#0a0d14",border:"1px solid #1e2230",borderRadius:8,padding:"8px",color:"#5a6070",fontSize:"0.65rem",fontFamily:"monospace"}}/>
              <button onClick={doCopy} style={{padding:"0 14px",background:"#facc15",border:"none",borderRadius:8,color:"#000",fontSize:"0.68rem",fontWeight:800,cursor:"pointer"}}>{copied?t.copied:"COPY"}</button>
            </div>
          </div>

          <button onClick={() => { localStorage.removeItem("wc26_uid"); window.location.href = window.location.pathname; }}
            style={{width:"100%",padding:"12px",background:"transparent",border:"1px solid #ef4444",borderRadius:10,color:"#ef4444",fontSize:"0.75rem",fontWeight:700,cursor:"pointer"}}>{t.signOut.toUpperCase()}</button>
        </div>
      );
    }

    // ─── MASTER APP CONTAINER ───
    const ALL_TEAMS = Object.values(GROUPS).flat();

    function App() {
      const [profile, setProfile] = useState(null);
      const [loadingSession, setLoadingSession] = useState(true);
      const [tab, setTab] = useState("schedule");
      const [matches, setMatches] = useState(BASE_MATCHES);
      const [users, setUsers] = useState({});
      const [predictions, setPredictions] = useState({});

      const [scoreModal, setScoreModal] = useState(null);
      const [scheduleKey, setScheduleKey] = useState(0);
      const [predictModal, setPredictModal] = useState(null);
      const [venueFilter, setVenueFilter] = useState(null); // venueId or null

      const t = T[profile?.lang || "en"];

      useEffect(() => {
        if (!db) return;

        const mRef = fbRef("matches");
        mRef.on("value", snap => {
          if (snap.exists()) {
            const serverData = snap.val();
            setMatches(prev => prev.map(m => serverData[m.id] ? { ...m, ...serverData[m.id] } : m));
          }
        });

        const uRef = fbRef("users");
        uRef.on("value", snap => {
          const allUsers = snap.exists() ? snap.val() : {};
          setUsers(allUsers);
          
          const params = new URLSearchParams(window.location.search);
          const urlUid = params.get("uid");
          const localUid = localStorage.getItem("wc26_uid");
          const activeUid = urlUid || localUid;

          if (activeUid && allUsers[activeUid]) {
            setProfile(allUsers[activeUid]);
            if (urlUid) localStorage.setItem("wc26_uid", urlUid);
            window.history.replaceState({}, document.title, window.location.pathname);
          }
          setLoadingSession(false);
        });

        const pRef = fbRef("predictions");
        pRef.on("value", snap => { if (snap.exists()) setPredictions(snap.val()); });

        return () => { mRef.off(); uRef.off(); pRef.off(); };
      }, []);

      const handleOnboardComplete = (prof) => {
        localStorage.setItem("wc26_uid", prof.uid);
        setProfile(prof);
        if (db) fbSet(`users/${prof.uid}`, prof);
      };

      const handleUpdateTeams = (newFavs) => {
        if (!profile) return;
        const updated = { ...profile, favorites: newFavs };
        setProfile(updated);
        if (db) fbSet(`users/${profile.uid}`, updated);
      };

      const saveMatchScore = (h, a) => {
        if (!scoreModal) return;
        fbSet(`matches/${scoreModal.id}`, { homeScore: h, awayScore: a });
        setScoreModal(null);
      };

      const saveUserPrediction = (h, a) => {
        if (!predictModal || !profile) return;
        fbSet(`predictions/${profile.uid}/${predictModal.id}`, { homeScore: h, awayScore: a, timestamp: Date.now() });
        setPredictModal(null);
      };

      if (loadingSession) {
        return (
          <div style={{minHeight:"100vh",background:"#080b12",display:"flex",alignItems:"center",justifyContent:"center",color:"#7a8090"}}>
            ⚡ Restoring Cloud Connection...
          </div>
        );
      }

      if (!profile) return <Onboarding onComplete={handleOnboardComplete} existingUsers={users} />;

      const tabs = [
        { id: "schedule", label: t.schedule, icon: "📅" },
        { id: "groups", label: t.groups, icon: "📋" },
        { id: "knockout", label: t.knockout, icon: "🏆" },
        { id: "venues", label: t.venues, icon: "🏟️" },
        { id: "leaderboard", label: t.leaderboard, icon: "🏅" },
        { id: "me", label: t.me, icon: "👤" }
      ];

      return (
        <div style={{minHeight:"100vh",background:"#080b12",color:"#f0f4ff",padding:"12px 12px 80px 12px",boxSizing:"border-box",maxWidth:480,margin:"0 auto"}}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;800&display=swap');`}</style>
          
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,borderBottom:"1px solid #1e2230",paddingBottom:10}}>
            <div>
              <div style={{fontSize:"0.55rem",color:"#7a8090",fontWeight:800}}>{t.welcome.toUpperCase()}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#f0f4ff"}}>{t.appName}</div>
            </div>
            <div style={{fontSize:"0.62rem",background:"rgba(74,222,128,0.08)",border:"1px solid #4ade80",color:"#4ade80",padding:"4px 8px",borderRadius:8,fontWeight:700}}>
              Synced ☁️
            </div>
          </div>

          {tab === "groups" && <GroupsTab t={t} matches={matches} />}
          {tab === "schedule" && <ScheduleTab key={scheduleKey} t={t} matches={matches} profile={profile} predictions={predictions} users={users} onScoreModal={setScoreModal} onPredictModal={setPredictModal} venueFilter={venueFilter} onClearVenueFilter={()=>setVenueFilter(null)} />}
          {tab === "knockout" && <KnockoutTab t={t} />}
          {tab === "venues" && <VenuesTab t={t} matches={matches} onVenueSelect={(vid)=>{ setVenueFilter(vid); setTab("schedule"); }} />}
          {tab === "leaderboard" && <LeaderboardTab t={t} users={users} matches={matches} predictions={predictions} />}
          {tab === "me" && <ProfileTab profile={profile} t={t} onUpdateTeams={handleUpdateTeams} />}

          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d1018",borderTop:"1px solid #1e2230",display:"flex",zIndex:50}}>
            <div style={{display:"flex",width:"100%",maxWidth:480,margin:"0 auto"}}>
              {tabs.map(tb => (
                <button key={tb.id} onClick={()=>{ if(tb.id==="schedule"&&tab==="schedule"){ setScheduleKey(k=>k+1); setVenueFilter(null); } setTab(tb.id); }} className="tab-btn"
                  style={{flex:1,padding:"8px 2px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span style={{fontSize:"0.95rem"}}>{tb.icon}</span>
                  <span style={{fontSize:"0.52rem",fontWeight:700,color:tab===tb.id?"#facc15":"#3a4050"}}>{tb.label.toUpperCase()}</span>
                  {tab===tb.id && <div style={{width:16,height:2,background:"#facc15",borderRadius:1}}/>}
                </button>
              ))}
            </div>
          </div>

          {scoreModal && (
            <ScoreModal match={scoreModal} t={t} profile={profile} onSave={saveMatchScore} onClose={()=>setScoreModal(null)} />
          )}
          {predictModal && (
            <PredictModal match={predictModal} pred={predictions?.[profile.uid]?.[predictModal.id]} t={t} onSave={saveUserPrediction} onClose={()=>setPredictModal(null)} />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
