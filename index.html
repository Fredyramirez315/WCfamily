<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Pool</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#080b12] text-[#f0f4ff] font-sans min-height-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const FIREBASE_CONFIG = {
          apiKey: "AIzaSyDUVXcwv4KFb_opjpj24PZ2GosU0LuTy7A",
          authDomain: "worldcup2026-a2c54.firebaseapp.com",
          databaseURL: "https://worldcup2026-a2c54-default-rtdb.firebaseio.com",
          projectId: "worldcup2026-a2c54",
          storageBucket: "worldcup2026-a2c54.firebasestorage.app",
          messagingSenderId: "434917853580",
          appId: "1:434917853580:web:ce0e37df4eb52237c7eea9"
        };

        // Initialize Firebase instantly on load to defeat iframe blocks
        if (window.firebase && !window.firebase.apps.length) {
            window.firebase.initializeApp(FIREBASE_CONFIG);
        }
        const db = window.firebase ? window.firebase.database() : null;

        const T = {
          en: {
            appName: "FIFA World Cup 2026™",
            welcome: "Welcome to the",
          }
        };

        function ls(key, val) {
          if (val === undefined) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
          localStorage.setItem(key, JSON.stringify(val));
        }
        function useLS(key, init) {
          const [v, setV] = useState(() => ls(key) ?? init);
          const set = useCallback(x => { setV(p => { const n=typeof x==="function"?x(p):x; ls(key,n); return n; }); }, [key]);
          return [v, set];
        }

        function Onboarding({ onComplete }) {
          const [name, setName] = useState("");
          return (
            <div className="flex flex-col items-center justify-center p-4 min-h-[400px]">
              <div className="text-center mb-6">
                <span className="text-5xl drop-shadow-[0_0_20px_rgba(250,204,21,0.4)]">⚽</span>
                <h1 className="text-3xl font-extrabold tracking-wider mt-2 text-white">WORLD CUP 2026</h1>
                <p className="text-[10px] text-gray-500 tracking-widest uppercase mt-1">Group Sandbox App</p>
              </div>
              <div className="bg-[#141720] border border-[#1e2230] rounded-2xl p-6 w-full max-w-sm shadow-xl">
                <label className="block text-xs font-semibold text-[#facc15] mb-2">Enter your name to start:</label>
                <input 
                  type="text" 
                  value={name} 
                  onChange={e => setName(e.target.value)} 
                  placeholder="e.g. Carlos" 
                  className="w-full bg-[#0a0d14] border border-[#1e2230] rounded-xl p-3 text-white text-sm font-medium mb-4 focus:outline-none focus:border-[#facc15]"
                />
                <button 
                  onClick={() => name.trim() && onComplete({ uid: "user_" + Math.random().toString(36).substring(2,9), name: name.trim() })}
                  className="w-full bg-[#facc15] text-black text-sm font-bold p-3 rounded-xl hover:bg-yellow-500 transition cursor-pointer"
                >
                  Let's Go! →
                </button>
              </div>
            </div>
          );
        }

        function App() {
          const [profile, setProfile] = useLS("wc26_user_profile", null);
          const [isConnected, setIsConnected] = useState(false);
          const t = T.en;

          // Sandbox-friendly active listener
          useEffect(() => {
            if (!db) return;
            
            const connectedRef = db.ref(".info/connected");
            const listener = connectedRef.on("value", (snap) => {
              if (snap.val() === true) {
                setIsConnected(true);
              } else {
                setIsConnected(false);
              }
            });

            return () => connectedRef.off("value", listener);
          }, []);

          // Sync registration payload
          useEffect(() => {
            if (isConnected && db && profile) {
              db.ref("users/" + profile.uid).set({
                name: profile.name,
                lastActive: new Date().toISOString()
              });
            }
          }, [isConnected, profile]);

          if (!profile) {
            return <Onboarding onComplete={setProfile} />;
          }

          const daysLeft = Math.ceil((new Date("2026-06-11") - new Date()) / (1000 * 60 * 60 * 24));

          return (
            <div className="max-w-md mx-auto p-2 flex flex-col justify-between min-h-[500px]">
              
              <header className="py-3 border-b border-[#1e2230]">
                <div className="flex justify-between items-center">
                  <div>
                    <p className="text-[10px] text-gray-500 uppercase tracking-wider">{t.welcome}</p>
                    <h2 className="text-lg font-black text-white">{t.appName}</h2>
                  </div>
                  <span className="bg-[#1e2230] px-3 py-1 rounded-full text-xs font-semibold text-[#facc15]">👤 {profile.name}</span>
                </div>
                
                <div className="mt-1 text-right">
                  <button 
                    onClick={() => { localStorage.clear(); window.location.reload(); }}
                    className="text-[10px] text-red-400 underline cursor-pointer hover:text-red-300"
                  >
                    Clear Data & Restart Onboarding
                  </button>
                </div>
              </header>

              <main className="flex-1 py-4 flex flex-col justify-center items-center">
                <div className="bg-[#141720] border border-[#1e2230] rounded-2xl p-6 w-full text-center shadow-lg">
                  <h3 className="text-[#facc15] font-bold uppercase tracking-widest text-[10px] mb-2">
                    🏆 Days Until Kickoff
                  </h3>
                  <div className="text-3xl font-black tracking-tight text-white">
                    {daysLeft > 0 ? `${daysLeft} Days Left` : "Tournament is Live!"}
                  </div>
                  <p className="text-[11px] text-gray-500 mt-1 italic">
                    Tournament starts June 11, 2026 in Mexico City
                  </p>
                </div>

                {!isConnected ? (
                  <div className="bg-[#141720] border border-dashed border-red-900/40 rounded-xl p-3 text-center mt-3 w-full">
                    <p className="text-xs text-red-400">⚠️ Establishing Cloud Sync...</p>
                  </div>
                ) : (
                  <div className="bg-[#141720] border border-emerald-900/30 rounded-xl p-3 text-center mt-3 w-full bg-gradient-to-b from-[#141720] to-[#0c1a10]">
                    <p className="text-xs text-emerald-400 font-bold">✅ Cloud Database Connected!</p>
                    <p className="text-[10px] text-gray-400 mt-0.5">Your Google Sites instance is fully synced online.</p>
                  </div>
                )}
              </main>

              <footer className="text-center py-2 text-[9px] text-gray-600 border-t border-[#1e2230]">
                FIFA World Cup 2026 Simulator Sandbox Mode
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
