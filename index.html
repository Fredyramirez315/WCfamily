    function generateGroupMatches() {
      const matches=[]; let id=1;
      Object.keys(GROUPS).forEach(g=>{
        const t=GROUPS[g],vv=GROUP_VENUES[g],base=GROUP_START_DAYS[g];
        [[0,1,1],[2,3,1],[0,2,2],[1,3,2],[0,3,3],[1,2,3]].forEach(([hi,ai,md], idx)=>{
          const d=new Date("2026-06-11");
          d.setDate(d.getDate()+base+(md-1)*5);
          const timeSlot = SLOT_TIMES[idx % SLOT_TIMES.length];
          matches.push({id:id++,group:g,home:t[hi],away:t[ai],matchday:md,
            date:d.toISOString().split("T")[0],time:timeSlot,venueId:vv[md-1],
            homeScore:null,awayScore:null,stage:"group"});
        });
      });
      return matches;
    }
    const BASE_MATCHES = generateGroupMatches();

    function calcMatchPoints(match, pred) {
      if (!pred || pred.homeScore === null || pred.homeScore === undefined) return null;
      if (match.homeScore === null || match.awayScore === null) return null;
      const hs=match.homeScore,as=match.awayScore,hp=pred.homeScore,ap=pred.awayScore;
      if (hp===hs && ap===as) return 3;
      const ar=hs>as?"H":hs<as?"A":"D", pr=hp>ap?"H":hp<ap?"A":"D";
      return ar===pr ? 1 : 0;
    }

    function genUID() { return "wc26_" + Math.random().toString(36).slice(2,9); }

                <div style={{fontWeight:700,fontSize:"0.8rem",color:"#f0f4ff",marginTop:3}}>{match.home}</div>
                <input type="number" min="0" value={h} onChange={e=>setH(e.target.value)}
                  style={{marginTop:8,width:58,textAlign:"center",background:"#0a0d14",border:"2px solid #a78bfa",borderRadius:8,padding:"6px 4px",fontSize:"1.4rem",fontWeight:800,color:"#a78bfa",fontFamily:"'Bebas Neue',sans-serif"}}/>
              </div>
              <div style={{color:"#3a4050",fontWeight:700,fontSize:"1rem"}}>—</div>
              <div style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:"2rem"}}>{FLAGS[match.away]||"🏳"}</div>
                <div style={{fontWeight:700,fontSize:"0.8rem",color:"#f0f4ff",marginTop:3}}>{match.away}</div>
                <input type="number" min="0" value={a} onChange={e=>setA(e.target.value)}
                  style={{marginTop:8,width:58,textAlign:"center",background:"#0a0d14",border:"2px solid #a78bfa",borderRadius:8,padding:"6px 4px",fontSize:"1.4rem",fontWeight:800,color:"#a78bfa",fontFamily:"'Bebas Neue',sans-serif"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onClose} style={{flex:1,padding:"11px",background:"transparent",border:"1px solid #1e2230",borderRadius:10,color:"#5a6070",cursor:"pointer"}}>{t.cancel}</button>
              <button onClick={()=>onSave(h===""?null:+h,a===""?null:+a)} style={{flex:2,padding:"11px",background:"#a78bfa",border:"none",borderRadius:10,color:"#000",fontWeight:800,cursor:"pointer"}}>{t.lockIn}</button>
            </div>
          </div>
        </div>
      );
    }

    function MatchCard({ match, profile, t, onScore, onPredict, userPred, isFav }) {
      const v = VENUES.find(v=>v.id===match.venueId);
      const hasScore = match.homeScore!==null && match.awayScore!==null;
      const hasPred = userPred?.homeScore!==undefined && userPred?.homeScore!==null;
      const pts = calcMatchPoints(match, userPred);
      const today = isToday(match.date);
      return (
        <div style={{background: isFav?"rgba(250,204,21,0.04)":"#141720",border:`1px solid ${isFav?"rgba(250,204,21,0.25)":"#1e2230"}`,borderRadius:14,padding:"11px 13px",marginBottom:6,position:"relative",fontFamily:"'Outfit',sans-serif"}}>
          {isFav && <div style={{position:"absolute",top:8,right:10,fontSize:"0.6rem",color:"#facc15"}}>⭐</div>}
          {today && <div style={{position:"absolute",top:8,left:13,fontSize:"0.58rem",background:"#ef4444",color:"#fff",fontWeight:700,padding:"1px 6px",borderRadius:4}}>{t.today}</div>}
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:"0.66rem",color:"#5a6070",marginTop:today?12:0}}>
            <span>Group {match.group} · {t.matchday}{match.matchday}</span>
            <span style={{color:"#facc15",fontWeight:600}}>{match.time} {t.timeLabel}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:"1.6rem"}}>{FLAGS[match.home]||"🏳"}</div>
              <div style={{fontWeight:700,fontSize:"0.72rem",color:"#f0f4ff",marginTop:2}}>{match.home}</div>
            </div>
            <div style={{textAlign:"center",minWidth:72}}>
              {hasScore ?
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.7rem",color:"#facc15",lineHeight:1}}>{match.homeScore} – {match.awayScore}</div> : <div style={{color:"#3a4050",fontWeight:700,fontSize:"0.9rem"}}>{t.vs}</div>
              }
              {hasPred && (
                <div style={{fontSize:"0.62rem",color:"#a78bfa",marginTop:2}}>
                  🔮 {userPred.homeScore}–{userPred.awayScore} {pts!==null && <span style={{marginLeft:3,fontWeight:800,color:pts===3?"#4ade80":pts===1?"#facc15":"#f87171"}}> +{pts}pt</span>}
                </div>
              )}
            </div>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:"1.6rem"}}>{FLAGS[match.away]||"🏳"}</div>
              <div style={{fontWeight:700,fontSize:"0.72rem",color:"#f0f4ff",marginTop:2}}>{match.away}</div>
            </div>
          </div>
          <div style={{fontSize:"0.63rem",color:"#3a4050",textAlign:"center",marginTop:5}}>{v?.fifaName} · {v?.city}</div>
          <div style={{display:"flex",gap:5,marginTop:7}}>
            {profile?.isAdmin && (
              <button onClick={onScore} style={{flex:1,padding:"5px",background:"transparent",border:"1px solid rgba(250,204,21,0.3)",borderRadius:8,color:"#facc15",fontSize:"0.65rem",fontWeight:700,cursor:"pointer"}}>{hasScore?t.editScore:t.enterScore}</button>
            )}
            <button onClick={onPredict} style={{flex:2,padding:"5px",background:hasPred?"transparent":"#a78bfa",border:`1px solid ${hasPred?"#3a4050":"#a78bfa"}`,borderRadius:8,color:hasPred?"#9aa0b0":"#000",fontSize:"0.65rem",fontWeight:800,cursor:"pointer"}}>{hasPred?t.editPred:t.predict}</button>
          </div>
        </div>
      );
    }

    // Tab Views
    function GroupsTab({ t, matches, profile, predictions }) {
      return (
        <div style={{paddingBottom:80}}>
          {Object.keys(GROUPS).map(g => (
            <div key={g} style={{background:"#10131c",border:"1px solid #1e2230",borderRadius:16,padding:"12px",marginBottom:14}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.3rem",color:"#facc15",marginBottom:2}}>GROUP {g}</div>
              <div style={{fontSize:"0.63rem",color:"#5a6070",marginBottom:10}}>{t.groupAdvance}</div>
              {matches.filter(m=>m.group===g).map(m => (
                <MatchCard key={m.id} match={m} profile={profile} t={t} isFav={profile?.favorites?.includes(m.home)||profile?.favorites?.includes(m.away)} userPred={predictions?.[profile?.uid]?.[m.id]} />
              ))}
            </div>
          ))}
        </div>
      );
    }

    function ScheduleTab({ t, matches, profile, predictions, onScoreModal, onPredictModal }) {
      const [filter, setFilter] = useState("all");
      
      const filtered = matches.filter(m => {
        if (filter === "today") return isToday(m.date);
        if (filter === "fav") return profile?.favorites?.includes(m.home) || profile?.favorites?.includes(m.away);
        return true;
      });

      const matchesByDate = {};
      filtered.forEach(m => {
        if (!matchesByDate[m.date]) matchesByDate[m.date] = [];
        matchesByDate[m.date].push(m);
      });

      const sortedDates = Object.keys(matchesByDate).sort();

      return (
        <div style={{paddingBottom:80}}>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {["all", "today", "fav"].map(f => (
              <button key={f} onClick={()=>setFilter(f)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:filter===f?"#facc15":"#141720",color:filter===f?"#000":"#7a8090",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"}}>
                {f === "all" ? "CHRONOLOGICAL" : f === "today" ? "TODAY" : "⭐ MY TEAMS"}
              </button>
            ))}
          </div>
          {sortedDates.length === 0 ? <div style={{textAlign:"center",color:"#3a4050",padding:"2rem",fontSize:"0.8rem"}}>{t.noMatches}</div> :
            sortedDates.map(dateStr => {
              const dOptions = { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' };
              const cleanDate = new Date(dateStr + "T00:00:00").toLocaleDateString(profile?.lang || "en", dOptions);
              
              return (
                <div key={dateStr} style={{marginBottom:20}}>
                  <div style={{fontSize:"0.85rem",fontWeight:800,color:"#facc15",padding:"4px 8px",background:"rgba(250,204,21,0.08)",borderRadius:6,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                    📅 {cleanDate}
                  </div>
                  {matchesByDate[dateStr].map(m => (
                    <MatchCard key={m.id} match={m} profile={profile} t={t} isFav={profile?.favorites?.includes(m.home)||profile?.favorites?.includes(m.away)} userPred={predictions?.[profile?.uid]?.[m.id]} onScore={()=>onScoreModal(m)} onPredict={()=>onPredictModal(m)} />
                  ))}
                </div>
              );
            })
          }
        </div>
      );
    }

    function KnockoutTab({ t }) {
      return (
        <div style={{paddingBottom:80,fontFamily:"'Outfit',sans-serif"}}>
          <div style={{background:"#10131c",border:"1px solid #1e2230",borderRadius:16,padding:"14px",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:"1rem",color:"#facc15"}}>{t.knockoutTitle}</div>
            <div style={{fontSize:"0.72rem",color:"#7a8090",marginTop:2}}>{t.knockoutSub}</div>
            <div style={{fontSize:"0.72rem",background:"rgba(250,204,21,0.05)",border:"1px dashed rgba(250,204,21,0.2)",borderRadius:10,padding:"10px",color:"#facc15",marginTop:12,textAlign:"center"}}>
              ⏳ {t.bracketPending}
            </div>
          </div>
        </div>
      );
    }

    function VenuesTab({ t }) {
      return (
        <div style={{paddingBottom:80,fontFamily:"'Outfit',sans-serif"}}>
          {VENUES.map(v => (
            <div key={v.id} style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:"0.8rem",color:"#f0f4ff"}}>{v.fifaName}</div>
                  <div style={{fontSize:"0.68rem",color:"#7a8090",marginTop:1}}>{v.realName} — <span style={{color:"#5a6070"}}>{v.city}, {v.country}</span></div>
                </div>
                <div style={{fontSize:"0.62rem",background:"#0a0d14",padding:"3px 6px",borderRadius:6,color:"#9aa0b0",fontWeight:600}}>{v.capacity.toLocaleString()} {t.capacity}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function LeaderboardTab({ t, users, matches, predictions }) {
      const calculated = Object.values(users || {}).map(u => {
        let score = 0; let exact = 0; let correct = 0; let count = 0;
        const upred = predictions?.[u.uid] || {};
        matches.forEach(m => {
          const pts = calcMatchPoints(m, upred[m.id]);
          if (pts !== null) { score += pts; count++; if (pts === 3) exact++; if (pts === 1) correct++; }
        });
        return { ...u, score, exact, correct, count };
      }).sort((a,b) => b.score - a.score || b.exact - a.exact);

      return (
        <div style={{paddingBottom:80,fontFamily:"'Outfit',sans-serif"}}>
          {calculated.map((u, idx) => (
            <div key={u.uid} style={{background:"#141720",border:"1px solid #1e2230",borderRadius:12,padding:"10px 12px",marginBottom:5,display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.2rem",color:"#3a4050",width:24}}>{idx+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:"0.8rem",color:"#f0f4ff"}}>
                  {u.name} {u.isAdmin && <span style={{fontSize:"0.52rem",background:"#facc15",color:"#000",padding:"0px 4px",borderRadius:3}}>ADMIN</span>}
                </div>
                <div style={{fontSize:"0.62rem",color:"#5a6070"}}>{u.count} {t.predictions} · {u.exact}🏅 · {u.correct}✓</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#facc15",lineHeight:1}}>{u.score}</div>
                <div style={{fontSize:"0.55rem",color:"#5a6070"}}>{t.pts.toUpperCase()}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ProfileTab({ profile, setProfile, t, fbReady, onUpdateTeams }) {
      const [copied, setCopied] = useState(false);
      const [editing, setEditing] = useState(false);
      const [favs, setFavs] = useState(profile.favorites || []);
      const shareUrl = `${window.location.origin}${window.location.pathname}?uid=${profile.uid}`;

      const doCopy = () => { navigator.clipboard.writeText(shareUrl); setCopied(true); setTimeout(() => setCopied(false), 2000); };
      const toggleFav = (t) => setFavs(f => f.includes(t)?f.filter(x=>x!==t):[...f,t]);
      const saveTeams = () => { onUpdateTeams(favs); setEditing(false); };

      return (
        <div style={{paddingBottom:80,fontFamily:"'Outfit',sans-serif"}}>
          <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:16,padding:"16px",textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:"2.5rem"}}>👤</div>
            <div style={{fontWeight:800,fontSize:"1.2rem",color:"#f0f4ff",marginTop:4}}>{profile.name}</div>
            <div style={{fontSize:"0.65rem",color:"#7a8090",marginTop:2}}>{profile.isAdmin ? "🥇 System Administrator" : "Family Competitor"}</div>
          </div>

          {!editing ? (
            <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:"#7a8090",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                <span>{t.favoriteTeams.toUpperCase()}</span>
                <button onClick={()=>setEditing(true)} style={{background:"transparent",border:"none",color:"#facc15",cursor:"pointer",fontSize:"0.7rem"}}>✏️ EDIT</button>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {profile.favorites?.map(f => (
                  <span key={f} style={{background:"#0a0d14",border:"1px solid #1e2230",padding:"4px 8px",borderRadius:6,fontSize:"0.68rem"}}>{FLAGS[f]} {f}</span>
                )) || <span style={{fontSize:"0.68rem",color:"#3a4050"}}>None</span>}
              </div>
            </div>
          ) : (
            <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:"#facc15",marginBottom:8}}>{t.pickFavorites}</div>
              <div style={{maxHeight:180,overflowY:"auto",display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                {ALL_TEAMS.map(team => {
                  const sel = favs.includes(team);
                  return (
                    <button key={team} onClick={()=>toggleFav(team)} style={{padding:"4px 8px",fontSize:"0.65rem",borderRadius:6,background:sel?"rgba(250,204,21,0.1)":"transparent",border:`1px solid ${sel?"#facc15":"#1e2230"}`,color:sel?"#facc15":"#7a8090",cursor:"pointer"}}>
                      {FLAGS[team]} {team}
                    </button>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEditing(false)} style={{flex:1,padding:"6px",background:"transparent",border:"1px solid #1e2230",color:"#5a6070",borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Cancel</button>
                <button onClick={saveTeams} style={{flex:2,padding:"6px",background:"#facc15",border:"none",color:"#000",fontWeight:800,borderRadius:6,cursor:"pointer",fontSize:"0.7rem"}}>Save Favorites</button>
              </div>
            </div>
          )}

          <div style={{background:"#141720",border:"1px solid #1e2230",borderRadius:14,padding:"12px",marginBottom:12}}>
            <div style={{fontSize:"0.72rem",fontWeight:700,color:"#facc15",marginBottom:3}}>{t.shareLink.toUpperCase()}</div>
            <div style={{fontSize:"0.65rem",color:"#5a6070",marginBottom:10}}>{t.shareLinkHint}</div>
            <div style={{display:"flex",gap:6}}>
              <input readOnly value={shareUrl} style={{flex:1,background:"#0a0d14",border:"1px solid #1e2230",borderRadius:8,padding:"8px",color:"#5a6070",fontSize:"0.65rem",fontFamily:"monospace"}}/>
              <button onClick={doCopy} style={{padding:"0 14px",background:"#facc15",border:"none",borderRadius:8,color:"#000",fontSize:"0.68rem",fontWeight:800,cursor:"pointer"}}>{copied?t.copied:"COPY"}</button>
            </div>
          </div>

          <button onClick={() => { localStorage.removeItem("wc26_uid"); window.location.href = window.location.pathname; }}
            style={{width:"100%",padding:"12px",background:"transparent",border:"1px solid #ef4444",borderRadius:10,color:"#ef4444",fontSize:"0.75rem",fontWeight:700,cursor:"pointer"}}>{t.signOut.toUpperCase()}</button>
        </div>
      );
    }

    // ─── MASTER CONTAINER APP ─────────────────────────────────────────────────────
    const ALL_TEAMS = Object.values(GROUPS).flat();

    function App() {
      const [profile, setProfile] = useState(null);
      const [loadingSession, setLoadingSession] = useState(true);
      const [tab, setTab] = useState("schedule");
      const [matches, setMatches] = useState(BASE_MATCHES);
      const [users, setUsers] = useState({});
      const [predictions, setPredictions] = useState({});

      const [scoreModal, setScoreModal] = useState(null);
      const [predictModal, setPredictModal] = useState(null);

      const t = T[profile?.lang || "en"];

      useEffect(() => {
        if (!db) return;

        const mRef = fbRef("matches");
        mRef.on("value", snap => {
          if (snap.exists()) {
            const serverData = snap.val();
            setMatches(prev => prev.map(m => serverData[m.id] ? { ...m, ...serverData[m.id] } : m));
          }
        });

        const uRef = fbRef("users");
        uRef.on("value", snap => {
          if (snap.exists()) {
            const allUsers = snap.val();
            setUsers(allUsers);
            
            const params = new URLSearchParams(window.location.search);
            const urlUid = params.get("uid");
            const localUid = localStorage.getItem("wc26_uid");
            const activeUid = urlUid || localUid;

            if (activeUid && allUsers[activeUid]) {
              setProfile(allUsers[activeUid]);
              if (urlUid) localStorage.setItem("wc26_uid", urlUid);
              window.history.replaceState({}, document.title, window.location.pathname);
            }
            setLoadingSession(false);
          } else {
            setLoadingSession(false);
          }
        });

        const pRef = fbRef("predictions");
        pRef.on("value", snap => { if (snap.exists()) setPredictions(snap.val()); });

        return () => { mRef.off(); uRef.off(); pRef.off(); };
      }, []);

      const handleOnboardComplete = (prof) => {
        localStorage.setItem("wc26_uid", prof.uid);
        setProfile(prof);
        if (db) fbSet(`users/${prof.uid}`, prof);
      };

      const handleUpdateTeams = (newFavs) => {
        if (!profile) return;
        const updated = { ...profile, favorites: newFavs };
        setProfile(updated);
        if (db) fbSet(`users/${profile.uid}`, updated);
      };

      const saveMatchScore = (h, a) => {
        if (!scoreModal) return;
        fbSet(`matches/${scoreModal.id}`, { homeScore: h, awayScore: a });
        setScoreModal(null);
      };

      const saveUserPrediction = (h, a) => {
        if (!predictModal || !profile) return;
        fbSet(`predictions/${profile.uid}/${predictModal.id}`, { homeScore: h, awayScore: a, timestamp: Date.now() });
        setPredictModal(null);
      };

      if (loadingSession) {
        return (
          <div style={{minHeight:"100vh",background:"#080b12",display:"flex",alignItems:"center",justifyContent:"center",color:"#7a8090",fontFamily:"'Outfit',sans-serif"}}>
            ⚡ Restoring Cloud Connection...
          </div>
        );
      }

      if (!profile) return <Onboarding onComplete={handleOnboardComplete} />;

      const tabs = [
        { id: "schedule", label: t.schedule, icon: "📅" },
        { id: "groups", label: t.groups, icon: "📋" },
        { id: "knockout", label: t.knockout, icon: "🏆" },
        { id: "venues", label: t.venues, icon: "🏟️" },
        { id: "leaderboard", label: t.leaderboard, icon: "🏅" },
        { id: "me", label: t.me, icon: "👤" }
      ];

      return (
        <div style={{minHeight:"100vh",background:"#080b12",color:"#f0f4ff",fontFamily:"'Outfit', sans-serif",padding:"12px 12px 80px 12px",boxSizing:"border-box",maxWidth:480,margin:"0 auto"}}>
          <style>{`@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;800&display=swap');`}</style>
          
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,borderBottom:"1px solid #1e2230",paddingBottom:10}}>
            <div>
              <div style={{fontSize:"0.55rem",color:"#7a8090",fontWeight:800}}>{t.welcome.toUpperCase()}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#f0f4ff"}}>{t.appName}</div>
            </div>
            <div style={{fontSize:"0.62rem",background:"rgba(74,222,128,0.08)",border:"1px solid #4ade80",color:"#4ade80",padding:"4px 8px",borderRadius:8,fontWeight:700}}>
              Synced ☁️
            </div>
          </div>

          {tab === "groups" && <GroupsTab t={t} matches={matches} profile={profile} predictions={predictions} />}
          {tab === "schedule" && <ScheduleTab t={t} matches={matches} profile={profile} predictions={predictions} onScoreModal={setScoreModal} onPredictModal={setPredictModal} />}
          {tab === "knockout" && <KnockoutTab t={t} />}
          {tab === "venues" && <VenuesTab t={t} />}
          {tab === "leaderboard" && <LeaderboardTab t={t} users={users} matches={matches} predictions={predictions} />}
          {tab === "me" && <ProfileTab profile={profile} setProfile={setProfile} t={t} fbReady={true} onUpdateTeams={handleUpdateTeams} />}

          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d1018",borderTop:"1px solid #1e2230",display:"flex",zIndex:50}}>
            <div style={{display:"flex",width:"100%",maxWidth:480,margin:"0 auto"}}>
              {tabs.map(tb => (
                <button key={tb.id} onClick={()=>setTab(tb.id)} className="tab-btn"
                  style={{flex:1,padding:"8px 2px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span style={{fontSize:"0.95rem"}}>{tb.icon}</span>
                  <span style={{fontSize:"0.52rem",fontWeight:700,color:tab===tb.id?"#facc15":"#3a4050"}}>{tb.label.toUpperCase()}</span>
                  {tab===tb.id && <div style={{width:16,height:2,background:"#facc15",borderRadius:1}}/>}
                </button>
              ))}
            </div>
          </div>

          {scoreModal && (
            <ScoreModal match={scoreModal} t={t} onSave={saveMatchScore} onClose={()=>setScoreModal(null)} />
          )}
          {predictModal && (
            <PredictModal match={predictModal} pred={predictions?.[profile.uid]?.[predictModal.id]} t={t} onSave={saveUserPrediction} onClose={()=>setPredictModal(null)} />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
